[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "beacon-sdk"
version = "0.1.0"
description = "Python SDK for the Beacon agent registry protocol"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
keywords = ["beacon", "agents", "ai", "registry", "a2a", "base", "x402"]
dependencies = [
    "httpx>=0.25.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio"]
